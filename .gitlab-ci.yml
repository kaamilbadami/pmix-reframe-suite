stages:
  - test

include:
  - project: ci/resources/templates
    ref: main
    file:
      - /runners.yml

variables:
  OLCF_SERVICE_ACCOUNT: "gen243_auser"
  FF_GIT_URLS_WITHOUT_TOKENS: "1"

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - when: never

pmix-python-suite:
  stage: test
  extends:
    - .frontier-shell-runner

  timeout: 1h

  resource_group: pmix-python-suite-frontier

  cache:
    key: pmix-master-state-v2
    paths:
      - .ci-state/pmix-master.env
    policy: pull-push

  script:
    - |
      set -euxo pipefail

      if ! bash ci/report_github_status.sh pending 'Frontier PMIx CI is running'; then
          printf 'warning: could not report pending status to GitHub\n' >&2
      fi

    - bash ci/test_should_run_pmix_suite.sh
    - bash ci/test_collect_ci_artifacts.sh
    - bash ci/test_report_github_status.sh
    - bash ci/test_run_exact_pmix_commit.sh
    - bash ci/test_discover_untested_pmix_commits.sh
    - bash ci/test_generate_pmix_child_pipeline.sh

    - |
      decision_file=".ci-state/pmix-decision.env"
      bash ci/should_run_pmix_suite.sh "$decision_file"
      source "$decision_file"

      if [[ "$PMIX_RUN_SUITE" == 0 ]]; then
          printf 'Skipping complete PMIx Python suite for OpenPMIx %s and suite %s: %s\n' \
              "$PMIX_COMMIT" "$CI_COMMIT_SHA" "$PMIX_RUN_REASON"
          exit 0
      fi

      export PMIX_COMMIT
      printf 'Running complete PMIx Python suite for OpenPMIx %s and suite %s: %s\n' \
          "$PMIX_COMMIT" "$CI_COMMIT_SHA" "$PMIX_RUN_REASON"

      module load miniforge3/23.11.0-0

      python3 -m venv .ci-venv
      source .ci-venv/bin/activate

      python -m pip install --upgrade pip
      python -m pip install "Cython==3.2.6" "reframe-hpc==4.10.0"

      export PMIX_PYTHON="${CI_PROJECT_DIR}/.ci-venv/bin/python"
      export RFM_BIN="${CI_PROJECT_DIR}/.ci-venv/bin/reframe"

      "${PMIX_PYTHON}" --version
      "${PMIX_PYTHON}" -c 'import Cython; print("Cython", Cython.__version__)'
      "${RFM_BIN}" --version

      bash ci/run_exact_pmix_commit.sh

      state_file=".ci-state/pmix-master.env"
      mkdir -p "$(dirname -- "$state_file")"
      state_tmp=$(mktemp "${state_file}.tmp.XXXXXX")
      trap 'rm -f -- "$state_tmp"' EXIT
      last_success_epoch=$(date -u +%s)
      printf 'PMIX_COMMIT=%s\nSUITE_COMMIT=%s\nLAST_SUCCESS_EPOCH=%s\n' \
          "$PMIX_COMMIT" "$CI_COMMIT_SHA" "$last_success_epoch" > "$state_tmp"
      mv -f -- "$state_tmp" "$state_file"
      trap - EXIT
      printf 'Saved successful PMIx suite state: OpenPMIx=%s suite=%s UTC_epoch=%s\n' \
          "$PMIX_COMMIT" "$CI_COMMIT_SHA" "$last_success_epoch"

  after_script:
    - |
      set +x
      set -uo pipefail

      case "${CI_JOB_STATUS:-}" in
          success)
              github_state=success
              if [[ -f .ci-state/pmix-decision.env ]] &&
                 grep -Fxq 'PMIX_RUN_SUITE=0' .ci-state/pmix-decision.env; then
                  description='Frontier check passed; full suite skipped'
              else
                  description='Frontier PMIx CI passed'
              fi
              ;;
          failed)
              github_state=failure
              description='Frontier PMIx CI failed'
              ;;
          canceled)
              github_state=error
              description='Frontier PMIx CI was canceled'
              ;;
          *)
              github_state=error
              description='Frontier PMIx CI ended with an unexpected status'
              ;;
      esac

      if ! bash ci/report_github_status.sh "$github_state" "$description"; then
          printf 'warning: could not report final status to GitHub\n' >&2
      fi

      if ! ci/collect_ci_artifacts.sh; then
          printf 'warning: could not collect CI artifacts\n' >&2
      fi

  artifacts:
    when: always
    expire_in: 14 days
    paths:
      - ci-artifacts/
