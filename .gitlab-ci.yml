stages:
  - pilot-generate
  - pilot-trigger
  - pr-prepare
  - test
  - pr-finalize

include:
  - project: ci/resources/templates
    ref: main
    file:
      - /runners.yml

variables:
  OLCF_SERVICE_ACCOUNT: "gen243_auser"
  FF_GIT_URLS_WITHOUT_TOKENS: "1"

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - when: never

generate-pmix-child-pipeline-pilot:
  stage: pilot-generate
  extends:
    - .frontier-shell-runner

  rules:
    - if: '$PMIX_TESTS_PR_EXECUTION_PILOT == "1"'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "web" && $PMIX_CHILD_PIPELINE_PILOT == "1"'
    - when: never

  cache:
    key: pmix-master-state-v2
    paths:
      - .ci-state/pmix-master.env
    policy: pull

  script:
    - |
      set -euo pipefail

      if [[ ! -f .ci-state/pmix-master.env ]]; then
          printf 'error: cached PMIx state was not restored: %s\n' \
              '.ci-state/pmix-master.env' >&2
          exit 1
      fi

      discovery_state=.ci-state/pmix-master.env
      official_state_checksum_before=$(sha256sum -- .ci-state/pmix-master.env)

      mkdir -p ci-generated

      if [[ -z ${PMIX_CHILD_PIPELINE_BASE_SHA:-} ]]; then
          printf '%s\n' 'Pilot discovery baseline: official cached state'
      else
          if [[ ! $PMIX_CHILD_PIPELINE_BASE_SHA =~ ^[0-9A-Fa-f]{40}$ ]]; then
              printf '%s\n' \
                  'error: PMIX_CHILD_PIPELINE_BASE_SHA must be exactly 40 hexadecimal characters' \
                  >&2
              exit 1
          fi
          printf 'PMIX_COMMIT=%s\n' "$PMIX_CHILD_PIPELINE_BASE_SHA" > \
              ci-generated/pmix-pilot-state.env
          discovery_state=ci-generated/pmix-pilot-state.env
          printf 'Pilot discovery baseline override: %s\n' \
              "$PMIX_CHILD_PIPELINE_BASE_SHA"
      fi

      for test_script in ci/test_*.sh; do
          echo "Running $test_script"
          bash "$test_script"
      done

      bash ci/discover_untested_pmix_commits.sh \
          "$discovery_state" \
          ci-generated/pmix-untested-commits.txt

      python3 ci/generate_pmix_child_pipeline.py \
          ci-generated/pmix-untested-commits.txt \
          ci-generated/pmix-child-pipeline.yml

      official_state_checksum_after=$(sha256sum -- .ci-state/pmix-master.env)
      if [[ $official_state_checksum_before != "$official_state_checksum_after" ]]; then
          printf '%s\n' \
              'error: the manual pilot modified the official cached PMIx state' >&2
          exit 1
      fi

      printf '%s\n' 'Discovered OpenPMIx commits:'
      cat ci-generated/pmix-untested-commits.txt

      printf '%s\n' 'Generated child pipeline:'
      cat ci-generated/pmix-child-pipeline.yml

  artifacts:
    expire_in: 1 day
    paths:
      - ci-generated/pmix-untested-commits.txt
      - ci-generated/pmix-child-pipeline.yml

trigger-pmix-child-pipeline-pilot:
  stage: pilot-trigger
  rules:
    - if: '$PMIX_TESTS_PR_EXECUTION_PILOT == "1"'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "web" && $PMIX_CHILD_PIPELINE_PILOT == "1"'
    - when: never
  trigger:
    include:
      - artifact: ci-generated/pmix-child-pipeline.yml
        job: generate-pmix-child-pipeline-pilot
    strategy: mirror

collect-reconcile-pmix-child-pipeline-pilot:
  stage: test
  extends:
    - .frontier-shell-runner

  timeout: 15m

  rules:
    - if: '$PMIX_TESTS_PR_EXECUTION_PILOT == "1"'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "web" && $PMIX_CHILD_PIPELINE_PILOT == "1"'
      when: always
    - when: never

  needs:
    - job: generate-pmix-child-pipeline-pilot
      artifacts: true
    - job: trigger-pmix-child-pipeline-pilot
      artifacts: false

  script:
    - bash ci/run_pmix_collection_reconciliation_pilot.sh ci-generated/pmix-untested-commits.txt ci-pilot-results

  artifacts:
    when: always
    expire_in: 14 days
    paths:
      - ci-generated/pmix-untested-commits.txt
      - ci-generated/pmix-child-pipeline.yml
      - ci-pilot-results/baseline-pmix-master.env
      - ci-pilot-results/current-pmix-master.env
      - ci-pilot-results/collection/collection-report.json
      - ci-pilot-results/collection/*.env
      - ci-pilot-results/reconciliation/reconciliation.env
      - ci-pilot-results/reconciliation/proposed-pmix-master.env

trigger-pmix-failed-result-pilot:
  stage: pilot-trigger
  rules:
    - if: '$PMIX_TESTS_PR_EXECUTION_PILOT == "1"'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "web" && $PMIX_FAILED_RESULT_PILOT == "1"'
    - when: never
  trigger:
    include:
      - local: ci/pmix_failed_result_child.yml
    strategy: mirror

probe-pmix-child-artifacts:
  stage: test
  extends:
    - .frontier-shell-runner

  timeout: 10m

  rules:
    - if: '$PMIX_TESTS_PR_EXECUTION_PILOT == "1"'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "web" && $PMIX_ARTIFACT_RETRIEVAL_PILOT == "1"'
      when: manual
    - when: never

  script:
    - python3 ci/probe_pmix_child_artifacts.py

  artifacts:
    when: always
    expire_in: 14 days
    paths:
      - ci-probe-results/

validate-pmix-tests-pr-pilot:
  stage: test
  extends:
    - .frontier-shell-runner

  rules:
    - if: '$PMIX_TESTS_PR_EXECUTION_PILOT == "1"'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "web" && $PMIX_TESTS_PR_PILOT == "1"'
    - when: never

  script:
    - |
      set -euo pipefail

      if [[ -z ${PMIX_TESTS_PR_NUMBER:-} ]]; then
          printf '%s\n' 'error: PMIX_TESTS_PR_NUMBER is required' >&2
          exit 2
      fi
      if [[ -z ${GITHUB_PR_READ_TOKEN:-} ]]; then
          printf '%s\n' 'error: GITHUB_PR_READ_TOKEN is required' >&2
          exit 2
      fi

      bash ci/run_pmix_tests_pr_metadata_pilot.sh \
          "$PMIX_TESTS_PR_NUMBER" ci-pr-pilot

  artifacts:
    when: always
    expire_in: 14 days
    paths:
      - ci-pr-pilot/pr.json
      - ci-pr-pilot/trusted-pr.env

prepare-pmix-tests-pr-pilot:
  stage: pr-prepare
  extends:
    - .frontier-shell-runner

  timeout: 10m

  rules:
    - if: '$CI_PIPELINE_SOURCE == "web" && $PMIX_TESTS_PR_EXECUTION_PILOT == "1"'
    - when: never

  script:
    - |
      # Trusted metadata/status boundary.  Eligibility is limited to the fixed
      # same-repository allowlist; approved-author code is trusted for this MVP.
      set -euo pipefail

      /usr/bin/rm -rf --one-file-system -- ci-pr-preparation
      if [[ -L ci-pr-preparation || -e ci-pr-preparation ]]; then
          printf '%s\n' 'error: could not remove previous preparation output' >&2
          exit 2
      fi

      if [[ -z ${PMIX_TESTS_PR_NUMBER:-} ]]; then
          printf '%s\n' 'error: PMIX_TESTS_PR_NUMBER is required' >&2
          exit 2
      fi
      if [[ -z ${GITHUB_PR_READ_TOKEN:-} ]]; then
          printf '%s\n' 'error: GITHUB_PR_READ_TOKEN is required' >&2
          exit 2
      fi
      if [[ -z ${GITHUB_STATUS_TOKEN:-} ]]; then
          printf '%s\n' 'error: GITHUB_STATUS_TOKEN is required' >&2
          exit 2
      fi

      /bin/bash ci/prepare_trusted_pmix_tests_pr.sh "$PMIX_TESTS_PR_NUMBER"

  artifacts:
    when: always
    expire_in: 14 days
    paths:
      - ci-pr-preparation/preparation.env

run-pmix-tests-pr-pilot:
  stage: test
  extends:
    - .frontier-shell-runner

  timeout: 1h

  resource_group: pmix-python-suite-frontier

  variables:
    GITHUB_PR_READ_TOKEN: ""
    GITHUB_STATUS_TOKEN: ""
    GIT_SUBMODULE_STRATEGY: none
    GIT_LFS_SKIP_SMUDGE: "1"

  rules:
    - if: '$CI_PIPELINE_SOURCE == "web" && $PMIX_TESTS_PR_EXECUTION_PILOT == "1"'
      when: always
    - when: never

  needs:
    - job: prepare-pmix-tests-pr-pilot
      artifacts: true

  script:
    - |
      # This shell still has runner variables and touches no PR content.  After
      # fixed-path stale-output removal, the helper crosses env -i; fixed
      # Frontier module initialization occurs only in that scrubbed environment.
      set +x
      set -euo pipefail
      /usr/bin/rm -rf --one-file-system -- ci-pr-execution
      if [[ -L ci-pr-execution || -e ci-pr-execution ]]; then
          printf '%s\n' 'error: could not remove previous execution output' >&2
          exit 2
      fi
      /bin/bash ci/run_pmix_tests_pr_isolated.sh

  artifacts:
    when: always
    expire_in: 14 days
    paths:
      - ci-pr-execution/result.env
      # The following checkout files are operator diagnostics only.  The
      # finalizer trusts neither them nor the execution workspace.
      - ci-pr-execution/checkout.env
      - ci-pr-execution/checkout-commit.txt
      - ci-pr-execution/test-source.sha256
      - ci-pr-execution/reframe/run-report.json
      - ci-pr-execution/reframe/stage/frontier/batch/pmix_test/PMIxTestsPRPythonSmokeTest/pmix-tests-pr-run-started.env
      - ci-pr-execution/reframe/stage/frontier/batch/pmix_test/PMIxTestsPRPythonSmokeTest/pmix-tests-pr-run-completed.env
      - ci-pr-execution/reframe/stage/frontier/batch/pmix_test/PMIxTestsPRPythonSmokeTest/pmix-tests-pr-client-started.env
      - ci-pr-execution/reframe/stage/frontier/batch/pmix_test/PMIxTestsPRPythonSmokeTest/pmix-tests-pr-client-completed.env
      - ci-pr-execution/reframe/stage/frontier/batch/pmix_test/PMIxTestsPRPythonSmokeTest/pmix-tests-pr-client-duplicate
      - ci-pr-execution/reframe/output/frontier/batch/pmix_test/PMIxTestsPRPythonSmokeTest/rfm_job.out
      - ci-pr-execution/reframe/output/frontier/batch/pmix_test/PMIxTestsPRPythonSmokeTest/rfm_job.err

finalize-pmix-tests-pr-pilot:
  stage: pr-finalize
  extends:
    - .frontier-shell-runner

  timeout: 10m

  variables:
    GIT_STRATEGY: clone
    GIT_SUBMODULE_STRATEGY: none
    GIT_LFS_SKIP_SMUDGE: "1"
    GITHUB_PR_READ_TOKEN: ""

  rules:
    - if: '$CI_PIPELINE_SOURCE == "web" && $PMIX_TESTS_PR_EXECUTION_PILOT == "1"'
      when: always
    - when: never

  needs:
    - job: prepare-pmix-tests-pr-pilot
      artifacts: true
    - job: run-pmix-tests-pr-pilot
      artifacts: true

  script:
    - |
      # GIT_STRATEGY=clone gives this job a fresh trusted suite checkout.  The
      # execution workspace contributes only a strictly parsed result record,
      # never scripts.  This does not protect against a malicious approved
      # author running as the same service account; that author is trusted by
      # the bounded MVP policy.
      set +x
      set -euo pipefail
      /bin/bash ci/finalize_pmix_tests_pr_status.sh \
          ci-pr-preparation/preparation.env \
          ci-pr-execution/result.env

pmix-python-suite:
  stage: test
  extends:
    - .frontier-shell-runner

  timeout: 1h

  resource_group: pmix-python-suite-frontier

  rules:
    - if: '$PMIX_TESTS_PR_EXECUTION_PILOT == "1"'
      when: never
    - if: '$PMIX_TESTS_PR_PILOT == "1"'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "web" && $PMIX_ARTIFACT_RETRIEVAL_PILOT == "1"'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "web" && $PMIX_FAILED_RESULT_PILOT == "1"'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "web" && $PMIX_CHILD_PIPELINE_PILOT == "1"'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - when: never

  cache:
    key: pmix-master-state-v2
    paths:
      - .ci-state/pmix-master.env
    policy: pull-push

  script:
    - |
      set -euxo pipefail

      if ! bash ci/report_github_status.sh pending 'Frontier PMIx CI is running'; then
          printf 'warning: could not report pending status to GitHub\n' >&2
      fi

    - bash ci/test_should_run_pmix_suite.sh
    - bash ci/test_collect_ci_artifacts.sh
    - bash ci/test_report_github_status.sh
    - bash ci/test_run_exact_pmix_commit.sh
    - bash ci/test_discover_untested_pmix_commits.sh
    - bash ci/test_generate_pmix_child_pipeline.sh
    - bash ci/test_pmix_collection_reconciliation_pilot.sh
    - bash ci/test_pmix_failed_result_child.sh
    - bash ci/test_probe_pmix_child_artifacts.sh
    - bash ci/test_write_pmix_commit_result.sh

    - |
      decision_file=".ci-state/pmix-decision.env"
      bash ci/should_run_pmix_suite.sh "$decision_file"
      source "$decision_file"

      if [[ "$PMIX_RUN_SUITE" == 0 ]]; then
          printf 'Skipping complete PMIx Python suite for OpenPMIx %s and suite %s: %s\n' \
              "$PMIX_COMMIT" "$CI_COMMIT_SHA" "$PMIX_RUN_REASON"
          exit 0
      fi

      export PMIX_COMMIT
      printf 'Running complete PMIx Python suite for OpenPMIx %s and suite %s: %s\n' \
          "$PMIX_COMMIT" "$CI_COMMIT_SHA" "$PMIX_RUN_REASON"

      module load miniforge3/23.11.0-0

      python3 -m venv .ci-venv
      source .ci-venv/bin/activate

      python -m pip install --upgrade pip
      python -m pip install "Cython==3.2.6" "reframe-hpc==4.10.0"

      export PMIX_PYTHON="${CI_PROJECT_DIR}/.ci-venv/bin/python"
      export RFM_BIN="${CI_PROJECT_DIR}/.ci-venv/bin/reframe"

      "${PMIX_PYTHON}" --version
      "${PMIX_PYTHON}" -c 'import Cython; print("Cython", Cython.__version__)'
      "${RFM_BIN}" --version

      bash ci/run_exact_pmix_commit.sh

      state_file=".ci-state/pmix-master.env"
      mkdir -p "$(dirname -- "$state_file")"
      state_tmp=$(mktemp "${state_file}.tmp.XXXXXX")
      trap 'rm -f -- "$state_tmp"' EXIT
      last_success_epoch=$(date -u +%s)
      printf 'PMIX_COMMIT=%s\nSUITE_COMMIT=%s\nLAST_SUCCESS_EPOCH=%s\n' \
          "$PMIX_COMMIT" "$CI_COMMIT_SHA" "$last_success_epoch" > "$state_tmp"
      mv -f -- "$state_tmp" "$state_file"
      trap - EXIT
      printf 'Saved successful PMIx suite state: OpenPMIx=%s suite=%s UTC_epoch=%s\n' \
          "$PMIX_COMMIT" "$CI_COMMIT_SHA" "$last_success_epoch"

  after_script:
    - |
      set +x
      set -uo pipefail

      case "${CI_JOB_STATUS:-}" in
          success)
              github_state=success
              if [[ -f .ci-state/pmix-decision.env ]] &&
                 grep -Fxq 'PMIX_RUN_SUITE=0' .ci-state/pmix-decision.env; then
                  description='Frontier check passed; full suite skipped'
              else
                  description='Frontier PMIx CI passed'
              fi
              ;;
          failed)
              github_state=failure
              description='Frontier PMIx CI failed'
              ;;
          canceled)
              github_state=error
              description='Frontier PMIx CI was canceled'
              ;;
          *)
              github_state=error
              description='Frontier PMIx CI ended with an unexpected status'
              ;;
      esac

      if ! bash ci/report_github_status.sh "$github_state" "$description"; then
          printf 'warning: could not report final status to GitHub\n' >&2
      fi

      if ! ci/collect_ci_artifacts.sh; then
          printf 'warning: could not collect CI artifacts\n' >&2
      fi

  artifacts:
    when: always
    expire_in: 14 days
    paths:
      - ci-artifacts/
