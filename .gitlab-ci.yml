stages:
  - test

include:
  - project: ci/resources/templates
    ref: main
    file:
      - /runners.yml

variables:
  OLCF_SERVICE_ACCOUNT: "gen243_auser"
  FF_GIT_URLS_WITHOUT_TOKENS: "1"

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - when: never

pmix-python-suite:
  stage: test
  extends:
    - .frontier-shell-runner

  timeout: 1h

  resource_group: pmix-python-suite-frontier

  cache:
    key: pmix-master-state-v1
    paths:
      - .ci-state/pmix-master.env
    policy: pull-push

  script:
    - |
      set -euxo pipefail

      decision_file=".ci-state/pmix-decision.env"
      bash ci/should_run_pmix_suite.sh "$decision_file"
      source "$decision_file"

      if [[ "$PMIX_RUN_SUITE" == 0 ]]; then
          printf 'Skipping complete PMIx Python suite: %s\n' "$PMIX_RUN_REASON"
          exit 0
      fi

      export PMIX_COMMIT
      printf 'Running complete PMIx Python suite for OpenPMIx %s: %s\n' \
          "$PMIX_COMMIT" "$PMIX_RUN_REASON"

      module load miniforge3/23.11.0-0

      python3 -m venv .ci-venv
      source .ci-venv/bin/activate

      python -m pip install --upgrade pip
      python -m pip install "Cython==3.2.6" "reframe-hpc==4.10.0"

      export PMIX_PYTHON="${CI_PROJECT_DIR}/.ci-venv/bin/python"
      export RFM_BIN="${CI_PROJECT_DIR}/.ci-venv/bin/reframe"

      "${PMIX_PYTHON}" --version
      "${PMIX_PYTHON}" -c 'import Cython; print("Cython", Cython.__version__)'
      "${RFM_BIN}" --version

      bash ci/run_pmix_python_suite.sh

      state_file=".ci-state/pmix-master.env"
      mkdir -p "$(dirname -- "$state_file")"
      state_tmp=$(mktemp "${state_file}.tmp.XXXXXX")
      trap 'rm -f -- "$state_tmp"' EXIT
      last_success_epoch=$(date -u +%s)
      printf 'PMIX_COMMIT=%s\nLAST_SUCCESS_EPOCH=%s\n' \
          "$PMIX_COMMIT" "$last_success_epoch" > "$state_tmp"
      mv -f -- "$state_tmp" "$state_file"
      trap - EXIT
      printf 'Saved successful PMIx suite state: SHA=%s UTC_epoch=%s\n' \
          "$PMIX_COMMIT" "$last_success_epoch"

  artifacts:
    when: always
    expire_in: 14 days
    paths:
      - output/
      - perflogs/
      - reports/
      - stage/frontier/batch/pmix_test/build_pmix_*/rfm_build.sh
      - stage/frontier/batch/pmix_test/build_pmix_*/rfm_build.out
      - stage/frontier/batch/pmix_test/build_pmix_*/rfm_build.err
      - stage/frontier/batch/pmix_test/build_pmix_*/pmix-git/config.log
      - stage/frontier/batch/pmix_test/build_pmix_*/python-site-packages
      - stage/frontier/batch/pmix_test/build_pmix_*/lib/python*/site-packages/pmix*
      - stage/frontier/batch/pmix_test/fetch_pmix_*/pmix-commit.env
